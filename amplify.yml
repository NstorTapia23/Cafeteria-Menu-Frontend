version: 1
frontend:
    phases:
        preBuild:
            commands:
                - corepack enable
                - corepack prepare pnpm@9.15.0 --activate
                - pnpm install --no-frozen-lockfile
        build:
            commands:
                - pnpm run build
    artifacts:
        baseDirectory: .next
        files:
            - '**/*'
    cache:
        paths:
            - .next/cache/**/*
            - node_modules/**/*