version: 1
frontend:
    phases:
        preBuild:
            commands:
                - corepack enable
                - corepack prepare pnpm@latest --activate
                - pnpm install --no-frozen-lockfile
                - pnpm approve-builds
        build:
            commands:
                - pnpm run build
    artifacts:
        baseDirectory: .next
        files:
            - '**/*'
    cache:
        paths:
            - .next/cache/**/*
            - node_modules/**/*